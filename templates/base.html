<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Hunt the Hint — AI Odyssey{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #e63946; --gold: #ffd60a; --blue: #00b4d8;
      --dark: #050810; --darker: #020408; --panel: #0a1628; --panel2: #0d1f3c;
      --border: #1a3a6e; --text: #c8d6e5;
      --glow-red: 0 0 20px rgba(230,57,70,0.6);
      --glow-gold: 0 0 20px rgba(255,214,10,0.6);
      --glow-blue: 0 0 20px rgba(0,180,216,0.5);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      background: var(--darker); color: var(--text);
      font-family: 'Exo 2', sans-serif; min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(230,57,70,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(0,180,216,0.04) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(26,58,110,0.15) 39px, rgba(26,58,110,0.15) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(26,58,110,0.15) 39px, rgba(26,58,110,0.15) 40px);
    }
    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 32px; background: rgba(5,8,16,0.95);
      border-bottom: 1px solid var(--border); backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 30px rgba(0,0,0,0.5);
    }
    .logo { font-family: 'Orbitron',sans-serif; font-weight: 900; font-size: 1.1rem;
      letter-spacing: 0.15em; color: var(--gold); text-shadow: var(--glow-gold); text-decoration: none; }
    .logo span { color: var(--red); }
    .nav-right { display: flex; gap: 12px; align-items: center; }
    .btn { font-family: 'Orbitron',sans-serif; font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.1em; padding: 8px 20px; border: none; border-radius: 3px;
      cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block; }
    .btn-red { background: var(--red); color: white; box-shadow: var(--glow-red); }
    .btn-red:hover { background: #ff4757; box-shadow: 0 0 30px rgba(230,57,70,0.8); transform: translateY(-1px); }
    .btn-gold { background: var(--gold); color: var(--dark); box-shadow: var(--glow-gold); }
    .btn-gold:hover { background: #ffe94d; transform: translateY(-1px); }
    .btn-outline { background: transparent; color: var(--blue); border: 1px solid var(--blue); }
    .btn-outline:hover { background: rgba(0,180,216,0.1); box-shadow: var(--glow-blue); }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--text); }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 24px; }
    .card-glow-red { box-shadow: inset 0 0 40px rgba(230,57,70,0.05), 0 0 1px var(--red); }
    .card-glow-gold { box-shadow: inset 0 0 40px rgba(255,214,10,0.05), 0 0 1px var(--gold); }
    .card-glow-blue { box-shadow: inset 0 0 40px rgba(0,180,216,0.05), 0 0 1px var(--blue); }
    h1,h2,h3 { font-family: 'Orbitron',sans-serif; }
    .mono { font-family: 'Share Tech Mono',monospace; }
    .tag { font-family: 'Orbitron',sans-serif; font-size: 0.6rem; letter-spacing: 0.15em;
      padding: 3px 10px; border-radius: 2px; text-transform: uppercase; }
    .tag-red { background: rgba(230,57,70,0.2); color: var(--red); border: 1px solid rgba(230,57,70,0.4); }
    .tag-gold { background: rgba(255,214,10,0.2); color: var(--gold); border: 1px solid rgba(255,214,10,0.4); }
    .tag-blue { background: rgba(0,180,216,0.2); color: var(--blue); border: 1px solid rgba(0,180,216,0.4); }
    .tag-green { background: rgba(46,213,115,0.2); color: #2ed573; border: 1px solid rgba(46,213,115,0.4); }
    input[type="text"], input[type="password"] {
      background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: var(--text);
      font-family: 'Share Tech Mono',monospace; font-size: 0.95rem;
      padding: 10px 14px; border-radius: 3px; width: 100%; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { outline: none; border-color: var(--blue); box-shadow: var(--glow-blue); }
    .flash { padding: 10px 16px; border-radius: 3px; font-size: 0.85rem; margin: 8px 0; }
    .flash-error { background: rgba(230,57,70,0.15); border: 1px solid rgba(230,57,70,0.4); color: var(--red); }
    .flash-success { background: rgba(46,213,115,0.15); border: 1px solid rgba(46,213,115,0.4); color: #2ed573; }
    @keyframes pulse-border { 0%,100%{box-shadow:0 0 5px rgba(230,57,70,0.3);} 50%{box-shadow:0 0 20px rgba(230,57,70,0.7);} }
    .scanline-overlay { position: fixed; top:0;left:0;right:0;bottom:0; pointer-events:none; z-index:9999;
      background: repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px); }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
<div class="scanline-overlay"></div>
<nav class="navbar">
  <a href="/" class="logo">HUNT<span>THE</span>HINT</a>
  <div class="nav-right">
    {% block nav_right %}
    <a href="/leaderboard" class="btn btn-outline">Leaderboard</a>
    {% endblock %}
  </div>
</nav>
{% block content %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
